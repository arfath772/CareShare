<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Care & Share - NGO Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f3f6fb;
            color: #1f2937;
        }
        .page-wrap {
            max-width: 980px;
            margin: 30px auto;
            background: #fff;
            border-top: 6px solid #00A0E3;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            border-radius: 6px;
            padding: 28px;
        }
        .title {
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 22px;
        }
        .section {
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
            background: #fafcff;
        }
        .section h5 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: #0f172a;
        }
        .required {
            color: #dc2626;
            font-weight: 700;
        }
        #alert {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-wrap">
        <h2 class="title"><i class="bi bi-building"></i> NGO Registration</h2>
        <p class="subtitle">Submit your legal profile and mandatory documents. NGO login is enabled only after admin approval.</p>

        <div id="alert" class="alert" role="alert"></div>

        <form id="ngoRegisterForm" enctype="multipart/form-data">
            <div class="section">
                <h5>Account Details</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Contact First Name <span class="required">*</span></label>
                        <input id="firstName" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Contact Last Name <span class="required">*</span></label>
                        <input id="lastName" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email <span class="required">*</span></label>
                        <input id="email" type="email" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Password <span class="required">*</span></label>
                        <input id="password" type="password" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Confirm Password <span class="required">*</span></label>
                        <input id="confirmPassword" type="password" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Office Location (City, State) <span class="required">*</span></label>
                        <input id="location" class="form-control" required>
                    </div>
                </div>
            </div>

            <div class="section">
                <h5>Legal Profile</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">NGO Legal Name <span class="required">*</span></label>
                        <input id="ngoLegalName" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">NGO PAN Number <span class="required">*</span></label>
                        <input id="ngoPan" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">NITI Aayog Darpan ID <span class="required">*</span></label>
                        <input id="ngoDarpanId" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Registered Office Address <span class="required">*</span></label>
                        <input id="ngoOfficeAddress" class="form-control" required>
                    </div>
                </div>
            </div>

            <div class="section">
                <h5>Mandatory Documents (PDF, JPG, PNG)</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Registration Certificate <span class="required">*</span></label>
                        <input type="file" id="registrationCertificate" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Trust Deed / MoA and Rules <span class="required">*</span></label>
                        <input type="file" id="trustDeedOrMoa" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">NGO PAN Card Copy <span class="required">*</span></label>
                        <input type="file" id="ngoPanCard" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">NITI Darpan Registration <span class="required">*</span></label>
                        <input type="file" id="nitiDarpanRegistration" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">12A Certificate <span class="required">*</span></label>
                        <input type="file" id="certificate12A" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">80G Certificate <span class="required">*</span></label>
                        <input type="file" id="certificate80G" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">CSR-1 Registration <span class="required">*</span></label>
                        <input type="file" id="csr1Registration" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Bank Account Proof <span class="required">*</span></label>
                        <input type="file" id="bankAccountProof" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Audited Accounts (2-3 years) <span class="required">*</span></label>
                        <input type="file" id="auditedAccounts" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Annual Report <span class="required">*</span></label>
                        <input type="file" id="annualReport" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Project Proposal <span class="required">*</span></label>
                        <input type="file" id="projectProposal" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">KYC of Executive Members <span class="required">*</span></label>
                        <input type="file" id="kycMembers" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Office Address Proof <span class="required">*</span></label>
                        <input type="file" id="officeAddressProof" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Governing Body List <span class="required">*</span></label>
                        <input type="file" id="governingBodyList" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
                    </div>
                </div>

                <div class="form-check mt-3">
                    <input class="form-check-input" type="checkbox" id="hasFcra">
                    <label class="form-check-label" for="hasFcra">FCRA applicable (foreign contributions)</label>
                </div>
                <div class="mt-3">
                    <label class="form-label">FCRA Registration Certificate (required only when applicable)</label>
                    <input type="file" id="fcraCertificate" class="form-control" accept=".pdf,.jpg,.jpeg,.png">
                </div>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label" for="terms">I confirm all submitted documents are valid and up to date.</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">Submit NGO Registration</button>

            <div class="text-center mt-3">
                <a href="/register">Back to User Registration</a> | <a href="/login">Sign In</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Immediate check for existing session
    if (localStorage.getItem('jwtToken')) {
        // Hide body to prevent flickering
        document.body.style.display = 'none';
        window.location.href = '/dashboard';
    }

    const requiredDocIds = [
        'registrationCertificate', 'trustDeedOrMoa', 'ngoPanCard', 'nitiDarpanRegistration',
        'certificate12A', 'certificate80G', 'csr1Registration', 'bankAccountProof',
        'auditedAccounts', 'annualReport', 'projectProposal', 'kycMembers',
        'officeAddressProof', 'governingBodyList'
    ];

    function showAlert(message, type) {
        const alertEl = document.getElementById('alert');
        alertEl.className = 'alert alert-' + type;
        alertEl.textContent = message;
        alertEl.style.display = 'block';
        if (type === 'success') {
            setTimeout(() => { alertEl.style.display = 'none'; }, 4000);
        }
    }

    document.getElementById('ngoRegisterForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const location = document.getElementById('location').value.trim();
        const ngoLegalName = document.getElementById('ngoLegalName').value.trim();
        const ngoPan = document.getElementById('ngoPan').value.trim();
        const ngoDarpanId = document.getElementById('ngoDarpanId').value.trim();
        const ngoOfficeAddress = document.getElementById('ngoOfficeAddress').value.trim();
        const hasFcra = document.getElementById('hasFcra').checked;

        if (password !== confirmPassword) {
            showAlert('Passwords do not match', 'danger');
            return;
        }

        if (!document.getElementById('terms').checked) {
            showAlert('Please confirm the declaration before submitting', 'danger');
            return;
        }

        const formData = new FormData();
        formData.append('firstName', firstName);
        formData.append('lastName', lastName);
        formData.append('email', email);
        formData.append('password', password);
        formData.append('location', location);
        formData.append('accountType', 'NGO');
        formData.append('ngoLegalName', ngoLegalName);
        formData.append('ngoPan', ngoPan);
        formData.append('ngoDarpanId', ngoDarpanId);
        formData.append('ngoOfficeAddress', ngoOfficeAddress);
        formData.append('hasFcra', hasFcra ? 'true' : 'false');

        for (const docId of requiredDocIds) {
            const input = document.getElementById(docId);
            if (!input.files || !input.files[0]) {
                showAlert('Please upload all mandatory NGO documents', 'danger');
                return;
            }
            formData.append(docId, input.files[0]);
        }

        if (hasFcra) {
            const fcraFile = document.getElementById('fcraCertificate').files[0];
            if (!fcraFile) {
                showAlert('FCRA certificate is required when foreign contributions are enabled', 'danger');
                return;
            }
            formData.append('fcraCertificate', fcraFile);
        }

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            if (!response.ok) {
                showAlert(data.message || 'Registration failed', 'danger');
                return;
            }

            showAlert(data.message || 'NGO registration submitted successfully', 'success');
            setTimeout(() => { window.location.href = '/login'; }, 2000);
        } catch (error) {
            showAlert('Network error. Please try again.', 'danger');
        }
    });
</script>
</body>
</html>
